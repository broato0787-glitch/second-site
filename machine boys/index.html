<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SWESCO MACHINE BOYS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header login-header">
        <div class="brand">
            <div class="brand-content">
                <img class="brand-logo" src="images/swesco.jpg" alt="SWESCO MACHINE BOYS Logo">
                <div class="brand-copy">
                    <h1>SWESCO MACHINE BOYS</h1>
                    <p>23rd Instrumentalist Club</p>
                </div>
            </div>
        </div>
    </header>

    <main class="login-page">
        <section class="login-card">
            <h2>Member Login</h2>
            <p>Enter your login details to continue to the event homepage.</p>
            <form id="loginForm" action="home.html" method="GET">
                <div class="login-field">
                    <label for="loginEmail">Email Address</label>
                    <input id="loginEmail" name="email" type="email" placeholder="you@example.com" required>
                </div>
                <div class="login-field">
                    <label for="loginPassword">Password</label>
                    <input id="loginPassword" name="password" type="password" placeholder="Password" required>
                </div>
                <button class="button" type="submit">Login</button>
            </form>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
